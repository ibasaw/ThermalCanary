app-id: io.github.ibasaw.ThermalCanary
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python311
command: thermalcanary

finish-args:
  # Display — support both X11 (gamers default) and Wayland
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # Hardware sensor access (read-only)
  # CPU temperature via lm-sensors / hwmon
  - --filesystem=/sys/class/hwmon:ro
  # GPU info (temperature, fan, VRAM) via DRM / sysfs
  - --filesystem=/sys/class/drm:ro
  - --filesystem=/sys/bus/pci/devices:ro
  # System-wide CPU and RAM stats (psutil)
  - --filesystem=/proc:ro

  # NVIDIA device nodes — required by pynvml
  - --device=all

  # Config persistence (~/.config/thermalcanary/config.yaml)
  - --filesystem=xdg-config/thermalcanary:create

  # System tray / status notifier
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=com.canonical.AppMenu.Registrar

  # Force X11 backend (XWayland) — required for fullscreen multi-monitor placement
  # via Mutter's WM_NORMAL_HINTS; native Wayland does not support the screen-
  # migration sequence that ThermalCanary uses (showNormal → setScreen → setGeometry).
  - --env=QT_QPA_PLATFORM=xcb

build-options:
  append-path: /usr/lib/sdk/python311/bin
  env:
    PYTHON: python3.11
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  # ── Python dependencies ────────────────────────────────────────────────────
  # For Flathub submission these sources MUST be generated offline:
  #
  #   pip install flatpak-pip-generator
  #   flatpak-pip-generator --runtime org.kde.Platform/x86_64/6.7 \
  #     PyQt6==6.7.1 psutil==6.1.1 PyYAML==6.0.2 nvidia-ml-py==12.560.30
  #
  # Then replace the build-commands here with the generated python-modules.json.
  # Until then, the build requires network access (fine for local dev, blocked
  # by Flathub CI).
  - name: python-deps
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/python311/bin/pip3 install --prefix=/app
          PyQt6==6.7.1
          psutil==6.1.1
          PyYAML==6.0.2
          nvidia-ml-py==12.560.30
    sources: []

  # ── Thermal Canary ─────────────────────────────────────────────────────────
  - name: thermalcanary
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/python311/bin/pip3 install --prefix=/app --no-deps .
      - install -Dm644 assets/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.ibasaw.ThermalCanary.png
      - install -Dm644 packaging/flatpak/io.github.ibasaw.ThermalCanary.desktop
          /app/share/applications/io.github.ibasaw.ThermalCanary.desktop
      - install -Dm644 packaging/flatpak/io.github.ibasaw.ThermalCanary.metainfo.xml
          /app/share/metainfo/io.github.ibasaw.ThermalCanary.metainfo.xml
    sources:
      - type: git
        url: https://github.com/ibasaw/thermalcanary.git
        # Update tag and commit after each release:
        tag: v1.1.0
        commit: HEAD  # replace with the actual commit SHA after tagging
